<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Pakistan International School</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    }
    
    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(102, 126, 234, 0.2);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      transform: perspective(1200px) rotateY(-2deg);
      transition: all 0.3s ease;
    }
    
    .login-container:hover {
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4), 0 0 60px rgba(102, 126, 234, 0.3);
      transform: perspective(1200px) rotateY(0deg);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 35px;
    }
    
    .login-header h1 {
      color: #667eea;
      font-size: 2rem;
      margin: 0 0 5px 0;
      text-shadow: 0 2px 4px rgba(102, 126, 234, 0.1);
    }
    
    .login-header p {
      color: #666;
      margin: 0;
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
      background: #f8f9ff;
    }
    
    .form-group input::placeholder {
      color: #999;
    }
    
    .forgot-password {
      text-align: right;
      margin-bottom: 25px;
    }
    
    .forgot-password a {
      color: #667eea;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .forgot-password a:hover {
      color: #764ba2;
      text-decoration: underline;
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .back-link a:hover {
      gap: 12px;
    }
    
    /* MOBILE RESPONSIVE DESIGN */
    @media (max-width: 768px) {
      body {
        padding: 12px;
      }
      
      .login-container {
        padding: 30px 20px;
        max-width: 100%;
        transform: perspective(1000px) rotateY(-1deg);
      }
      
      .login-header h1 {
        font-size: 1.6rem;
        margin-bottom: 3px;
      }
      
      .login-header p {
        font-size: 0.85rem;
      }
      
      .form-group {
        margin-bottom: 16px;
      }
      
      .form-group label {
        font-size: 0.9rem;
        margin-bottom: 6px;
      }
      
      .form-group input {
        padding: 11px 12px;
        font-size: 0.95rem;
        border-radius: 8px;
      }
      
      .forgot-password a {
        font-size: 0.8rem;
      }
      
      .login-btn {
        padding: 12px;
        font-size: 1rem;
        border-radius: 8px;
      }
      
      .back-link {
        margin-top: 16px;
      }
      
      .back-link a {
        font-size: 0.9rem;
      }
    }
    
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      
      .login-container {
        padding: 24px 16px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      }
      
      .login-header {
        margin-bottom: 24px;
      }
      
      .login-header h1 {
        font-size: 1.4rem;
        margin-bottom: 2px;
      }
      
      .form-group {
        margin-bottom: 14px;
      }
      
      .form-group label {
        font-size: 0.85rem;
      }
      
      .form-group input {
        padding: 10px 12px;
        font-size: 0.9rem;
        min-height: 44px;
        border-radius: 8px;
      }
      
      .forgot-password {
        margin-bottom: 18px;
      }
      
      .login-btn {
        padding: 11px;
        font-size: 0.95rem;
        min-height: 44px;
      }
    }
    
    @media (max-width: 480px) {
      .login-container {
        padding: 20px 14px;
      }
      
      .login-header h1 {
        font-size: 1.25rem;
      }
      
      .login-header p {
        font-size: 0.8rem;
      }
      
      .form-group input {
        font-size: 16px;
      }
    }
    
    /* TOUCH DEVICE OPTIMIZATION */
    @media (hover: none) and (pointer: coarse) {
      .form-group input,
      .login-btn,
      .forgot-password a,
      .back-link a {
        min-height: 48px;
        padding: 12px;
      }
      
      .login-btn:active {
        background: linear-gradient(135deg, #5568d3 0%, #6a3f8f 100%);
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>👨‍💼 ADMIN LOGIN</h1>
      <p>Pakistan International School</p>
    </div>
    
    <form id="adminLoginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="Enter your username"
          required
        />
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password"
          required
        />
      </div>
      
      <div class="forgot-password">
        <a href="#" onclick="handleForgotPassword(event)">Forgot Password?</a>
      </div>
      
      <button type="submit" class="login-btn">Login to Admin Portal</button>
    </form>
    
    <div class="back-link">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>
  
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      // Demo credentials
      if (username === 'admin' && password === 'admin123') {
        // Show loading animation
        document.querySelector('.login-btn').textContent = '🔄 Redirecting...';
        document.querySelector('.login-btn').disabled = true;
        
        // Redirect to admin dashboard after 1 second
        setTimeout(() => {
          window.location.href = 'admin-dashboard.html';
        }, 1000);
      } else {
        alert('❌ Invalid Username or Password!\n\nDemo Credentials:\nUsername: admin\nPassword: admin123');
      }
    });
    
    function handleForgotPassword(e) {
      e.preventDefault();
      const email = prompt('Enter your registered email address:');
      if (email) {
        alert('✉️ Password reset link has been sent to:\n' + email + '\n\nPlease check your email.');
      }
    }
  </script>
</body>
</html>
